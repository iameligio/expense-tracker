# Apache vhost for AlmaLinux 9 (httpd). Place in /etc/httpd/conf.d/
# and change ServerName to your real domain. Run certbot afterwards to add
# the HTTPS (:443) vhost and an HTTP->HTTPS redirect automatically.
#
# Requires modules: proxy, proxy_http, rewrite, headers (all default on AlmaLinux).

# Recommended global hardening (set once in /etc/httpd/conf/httpd.conf):
#   ServerTokens Prod
#   ServerSignature Off
#   TraceEnable Off

<VirtualHost *:80>
    ServerName expense-tracker.example.com
    DocumentRoot /var/www/expense-tracker/frontend/dist

    # --- Security headers (requires mod_headers) ---
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
    # HSTS: certbot adds this to the :443 vhost; safe here too (only honored over HTTPS)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # --- Serve the built React SPA ---
    <Directory /var/www/expense-tracker/frontend/dist>
        Require all granted
        Options -Indexes
        # Client-side routing: serve index.html for any path that is not a real file
        FallbackResource /index.html
    </Directory>

    # --- Proxy the API to the Go backend ---
    # ProxyPass is evaluated before the filesystem, so /api never hits FallbackResource.
    ProxyPreserveHost On
    ProxyPass        /api  http://127.0.0.1:8080/api
    ProxyPassReverse /api  http://127.0.0.1:8080/api

    ErrorLog  /var/log/httpd/expense-tracker-error.log
    CustomLog /var/log/httpd/expense-tracker-access.log combined
</VirtualHost>
